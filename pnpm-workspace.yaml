packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  shadcn: ^4.10.0
  class-variance-authority: ^0.7.1
  tw-animate-css: ^1.4.0
  radix-ui: ^1.5.0
  lucide-react: ^1.17.0
  "@fontsource-variable/noto-serif": ^5.2.9
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  msw: false
